services:
  n8n:
    image: docker.n8n.io/n8nio/n8n:latest
    container_name: n8n
    restart: unless-stopped
    environment:
      # --- Acceso y URL pública (viene del .env) ---
      - N8N_HOST=${N8N_DOMAIN}
      - N8N_PORT=5678
      - N8N_PROTOCOL=https
      - WEBHOOK_URL=https://${N8N_DOMAIN}/
      - N8N_EDITOR_BASE_URL=https://${N8N_DOMAIN}/

      # --- Seguridad ---
      - N8N_SECURE_COOKIE=true
      - N8N_ENCRYPTION_KEY=${N8N_ENCRYPTION_KEY}

      # --- Zona horaria ---
      - GENERIC_TIMEZONE=Europe/Madrid
      - TZ=Europe/Madrid

      # --- Ejecución (evita reenvíos por proxy) ---
      - N8N_PROXY_HOPS=1
      - NODE_ENV=production

      # --- Telemetría mínima ---
      - N8N_DIAGNOSTICS_ENABLED=false
      - N8N_VERSION_NOTIFICATIONS_ENABLED=true
      - N8N_PERSONALIZATION_ENABLED=false
    volumes:
      - ./data:/home/node/.n8n
      - ./files:/home/node/.n8n-files
    networks:
      - proxy-nw   # cámbialo por el nombre de tu red Caddy/reverse-proxy existente

  n8n-db:
    image: postgres:16-alpine
    container_name: n8n-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${N8N_DB_USER}
      POSTGRES_PASSWORD: ${N8N_DB_PASSWORD}
      POSTGRES_DB: ${N8N_DB_NAME}
    volumes:
      - ./db-data:/var/lib/postgresql/data
    networks:
      - proxy-nw
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${N8N_DB_USER} -d ${N8N_DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  proxy-nw:
    external: true
