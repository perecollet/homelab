# ads/compose.yaml — AdGuard Home (DNS-level ad blocking, LAN only)
services:
  adguard:
    image: adguard/adguardhome:latest
    container_name: adguard
    restart: unless-stopped
    ports:
      - "192.168.1.62:53:53/tcp"
      - "192.168.1.62:53:53/udp"
    volumes:
      - /srv/adguard/work:/opt/adguardhome/work
      - /srv/adguard/conf:/opt/adguardhome/conf
    networks:
      - proxy-nw

networks:
  proxy-nw:
    external: true