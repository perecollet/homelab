services:
  caddy:
    build: .
    container_name: caddy
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    ports:
      - "2080:2080"
      - "80:80"
      - "443:443"
    networks:
      - proxy-nw

networks:
  proxy-nw:
    external: true

volumes:
  caddy_data:
  caddy_config:
