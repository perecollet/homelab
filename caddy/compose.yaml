services:
  caddy:
    build: .
    container_name: caddy
    restart: unless-stopped
    environment:
      - CLOUDFLARE_API_TOKEN=${CF_TOKEN}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - proxy-nw

networks:
  proxy-nw:
    external: true

volumes:
  caddy_data:
  caddy_config: